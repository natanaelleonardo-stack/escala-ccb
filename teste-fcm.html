<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste FCM</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
  .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  h2 { color: #0d3a6e; margin: 0 0 8px; font-size: 16px; }
  .log { background: #1a1a2e; color: #a8e6a8; font-family: monospace; font-size: 12px; padding: 12px; border-radius: 6px; white-space: pre-wrap; min-height: 100px; max-height: 300px; overflow-y: auto; }
  .err { color: #ff7070; }
  button { background: #0d3a6e; color: #fff; border: none; padding: 12px 20px; border-radius: 6px; font-size: 14px; font-weight: 600; width: 100%; margin-top: 8px; cursor: pointer; }
  .status { font-size: 13px; color: #555; margin-top: 8px; }
</style>
</head>
<body>

<div class="card">
  <h2>🔔 Teste de Notificações FCM</h2>
  <div class="status" id="perm-status">Verificando permissão...</div>
  <button onclick="testarToken()">Gerar Token FCM</button>
</div>

<div class="card">
  <h2>Log</h2>
  <div class="log" id="log">Aguardando...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBlIGffJakruG1rH5w2HDjS-kxLoj1Hti8",
  authDomain: "escala-ccb-1e9fe.firebaseapp.com",
  projectId: "escala-ccb-1e9fe",
  storageBucket: "escala-ccb-1e9fe.firebasestorage.app",
  messagingSenderId: "123319415955",
  appId: "1:123319415955:web:7b7d21b7bb8b8043150966"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const messaging = firebase.messaging();

const VAPID_KEY = 'ULwUDyyx_b9cz4p9i2sKt11yJaExNckttbSQgCdN1mo';

// ID do porteiro Rodrigo — substitua se necessário
const PORTEIRO_ID = 'sXgBTGToMy7cUHjZ5qun';

function log(msg, erro = false) {
  const el = document.getElementById('log');
  const linha = document.createElement('div');
  linha.textContent = msg;
  if (erro) linha.className = 'err';
  el.appendChild(linha);
  el.scrollTop = el.scrollHeight;
}

// verifica permissão atual
window.onload = () => {
  const perm = Notification.permission;
  document.getElementById('perm-status').textContent = `Permissão de notificação: ${perm}`;
  log(`Permissão atual: ${perm}`);
  log(`Firebase Messaging disponível: ${!!messaging}`);
};

async function testarToken() {
  log('--- Iniciando teste ---');
  try {
    log('Solicitando permissão...');
    const perm = await Notification.requestPermission();
    log(`Permissão: ${perm}`);

    if (perm !== 'granted') {
      log('Permissão negada. Ative nas configurações do navegador.', true);
      return;
    }

    log('Obtendo token FCM...');
    const registration = await navigator.serviceWorker.register('/escala-ccb/firebase-messaging-sw.js');
    const token = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: registration });

    if (!token) {
      log('Token vazio! Verifique o Service Worker.', true);
      return;
    }

    log('Token gerado: ' + token.slice(0, 30) + '...');
    log('Token completo (copie):');
    log(token);

    // tenta salvar no Firestore se tiver o ID
    if (PORTEIRO_ID !== 'SEU_ID_AQUI') {
      await db.collection('porteiros').doc(PORTEIRO_ID).update({ fcmToken: token });
      log('✓ Token salvo no Firestore!');
    } else {
      log('⚠️ Substitua SEU_ID_AQUI pelo ID real do porteiro no código desta página.');
    }

  } catch (e) {
    log('ERRO: ' + e.message, true);
    log('Código: ' + e.code, true);
  }
}
</script>
</body>
</html>
